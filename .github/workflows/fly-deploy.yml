name: Test & Deploy to Fly.io

on:
  push:
    branches:
      - main

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --dev

      - name: Run tests
        run: uv run pytest tests/ -x -q
        env:
          DATABASE_URL: ""
          ANTHROPIC_API_KEY: ""
          GOOGLE_MAPS_API_KEY: ""
          SCHOOLDIGGER_APP_ID: ""
          SCHOOLDIGGER_APP_KEY: ""
          COMMUTE_DESTINATION: "Brookfield Place, New York, NY"
          MANAGE_KEY: "test-key"

  deploy:
    name: Deploy app
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
